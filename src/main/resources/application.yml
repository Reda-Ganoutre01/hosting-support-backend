spring:
  application:
    name: hosting-support-backend

  datasource:
    url: jdbc:mysql://localhost:3306/hosting_support_db
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true

# application.yml - JWT configuration

app:
  jwt:
    # Base64-encoded secret key (use a strong random key in production)
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGp3dCB0b2tlbiBzaWduaW5n}
    # Token expires after 24 hours
    expiration-ms: 86400000
server:
  port: 8080
